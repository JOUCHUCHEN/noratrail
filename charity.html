<!DOCTYPE html>

<html class="light" lang="zh-TW"><head>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>良野 - Nora Trail</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "background": "#F8F9FA",
                        "primary": "#8B5E3C",
                        "on-background": "#8B5E3C",
                        "surface": "#ffffff",
                        "outline-variant": "#EAE5D9",
                        "secondary": "#4A6741",
                        "tertiary": "#E69A6A",
                        "brand-green": "#4A6741",
                        "brand-orange": "#E69A6A",
                    },
                    fontFamily: {
                        "headline": ["Source Han Sans TC", "Noto Sans TC", "Epilogue", "sans-serif"],
                        "body": ["Source Han Sans TC", "Noto Sans TC", "Manrope", "sans-serif"],
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            min-height: 100dvh;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon-primary-filter {
            filter: invert(39%) sepia(13%) saturate(1476%) hue-rotate(345deg) brightness(95%) contrast(83%);
        }
    </style>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-background text-on-background font-body selection:bg-primary/20 pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full px-6 py-4 flex justify-between items-center bg-background/80 backdrop-blur-md z-50">
<div class="flex items-center gap-2">
<img alt="Brand Logo" class="h-6 w-auto object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0ujxjshdtqZw2K-gPc1YpXIXQxvkSa3hObxKI1UNOMX_MR2epROc_CKaumjy86hZ7rSxyrt-uWUsk1TDU8lvUEIegdg2DboA1aubuP73GWwI-ns1b-ruToILQFxVnVuRWOfDVyMGtkpHogJySV6Z1hjGDNam6hkIFB6LmVk-_nxvw-OCmG8LoWMv8Nf3Bcn-be-0AthDtVZQ1_NaHUwOZmdgMha1C5m9Y9GFb8AOhpHmH_qMUAKwCXdLUNf3UBxtgKOrUkk4b9e_AOU"/>
<h1 class="font-headline tracking-tight text-[18px] font-bold text-primary">Nora trail</h1>
</div>
</header>
<main class="mt-20 px-6 max-w-md mx-auto space-y-8 fade-in">
<!-- Page Header -->
<div class="mb-8">
<h2 class="text-3xl font-black tracking-widest mb-2 font-['Noto_Sans_TC']">良野</h2>
<p class="text-stone-500 text-sm font-medium">讓每一步路，都有意義。</p>
</div>
<!-- 基金季度報告 (Fiscal Report) -->
<div>
<!-- Reduced margin from 15px to 13.5px (-10%) -->
<div class="flex items-center space-x-2 text-emerald-600 font-bold px-2 mb-[13.5px] font-['Noto_Sans_TC'] text-[18px]">
<svg class="lucide lucide-activity" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
</svg>
<h3 class="text-lg font-bold">浪浪醫療救助基金季度報告</h3>
</div>
<section class="bg-white rounded-[32px] p-6 shadow-sm border border-stone-100 relative">
<div class="absolute top-5 right-6 bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase z-10">2026 Q3</div>
<div class="grid grid-cols-2 gap-4 font-black text-center mt-8">
<!-- Reduced padding from 22.8px to 20.52px (-10%) -->
<div class="bg-stone-50 py-[20.52px] px-6 rounded-2xl border border-stone-100">
<div class="text-2xl text-secondary">¥0</div>
<div class="text-[9px] opacity-40 uppercase tracking-widest mt-1">已籌得</div>
</div>
<!-- Reduced padding from 22.8px to 20.52px (-10%) -->
<div class="bg-stone-50 py-[20.52px] px-6 rounded-2xl border border-stone-100">
<div class="text-2xl text-secondary">0 隻</div>
<div class="text-[9px] opacity-40 uppercase tracking-widest mt-1">已救助</div>
</div>
</div>
</section>
</div>
<!-- 浪浪領養資訊 (Pet Adoption) -->
<section>
<h3 class="font-bold px-2 flex items-center space-x-2 text-[#8B5E3C] mb-[16px] font-['Noto_Sans_TC'] text-[18px]">
<svg class="lucide lucide-heart" fill="none" height="20" stroke="#E69A6A" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path>
</svg>
<span>浪浪領養資訊</span>
</h3>
<div class="space-y-6">
<!-- Pet Card: 橘子 -->
<div class="bg-white rounded-[32px] overflow-hidden shadow-sm border border-stone-100">
<div class="relative aspect-[4/3]">
<img alt="橘子" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida/ADBb0ughsQY_1d9yDktkbMmr_GXXoddH03buAbMgcs-WWkcEODdQybnqv3Vfe6FsuUPb4ND3sOf-YV6rplfq83YKojAirFQq-6KBw2XJWYwhNMpRfkLUvsZ4zAsf18J_-6fPkPSkx1sSHmr0JvX4lpGfiqb-SL7MQV7gIOJkomI8UoiSnS4hRhy5TnVoZ9ctXjFyUmAGpj8tmdyytoSChn0h7w7vAIfZAP9BzOzdsRn477BvSgBB757hC960MbXBJHvfVP9yO40jVGC4EJQ"/>
<div class="absolute top-4 left-4 bg-white/90 backdrop-blur-md px-3 py-1 rounded-full text-[10px] font-black tracking-widest text-primary uppercase shadow-sm">待領養</div>
</div>
<div class="p-6">
<div class="flex justify-between items-center mb-4">
<h4 class="text-2xl font-black text-on-background font-['Noto_Sans_TC']">橘子</h4>
<span class="text-[11px] font-black text-tertiary bg-orange-50 px-3 py-1 rounded-full">1.5 歲</span>
</div>
<p class="text-stone-500 text-sm leading-relaxed font-medium mb-6">
                            親人黏人，愛撒嬌，是一個性格非常穩定的橘貓夥伴。
                        </p>
<div class="flex flex-wrap gap-2 mb-8">
<span class="px-3 py-1 bg-stone-50 rounded-full text-[10px] font-bold text-stone-400 border border-stone-100">已絕育</span>
<span class="px-3 py-1 bg-stone-50 rounded-full text-[10px] font-bold text-stone-400 border border-stone-100">已驅蟲</span>
<span class="px-3 py-1 bg-stone-50 rounded-full text-[10px] font-bold text-stone-400 border border-stone-100">貓砂熟練</span>
</div>
<button class="w-full bg-primary text-white py-4 rounded-2xl font-black text-sm active:scale-95 transition-all shadow-lg shadow-primary/10">
                            領養諮詢
                        </button>
</div>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 right-0 z-50 bg-white border-t border-stone-100 flex justify-around items-center px-4 pt-3 pb-8 shadow-[0_-4px_12px_rgba(0,0,0,0.03)]">
<!-- Nav Item: 野路子 -->
<a class="flex flex-col items-center text-stone-300 transition-all" href="#">
<i class="w-6 h-6" data-lucide="map"></i>
<span class="text-[10px] font-black mt-1 tracking-wider">野路子</span>
</a>
<!-- Nav Item: 良野 (Active) -->
<a class="flex flex-col items-center text-[#8B5E3C] scale-110 transition-all" href="#">
<i class="w-6 h-6" data-lucide="paw-print"></i>
<span class="text-[10px] font-black mt-1 tracking-wider">良野</span>
</a>
<!-- Nav Item: 商店 -->
<a class="flex flex-col items-center text-stone-300 transition-all" href="#">
<i class="w-6 h-6" data-lucide="shopping-bag"></i>
<span class="text-[10px] font-black mt-1 tracking-wider">商店</span>
</a>
<!-- Nav Item: 關於 -->
<a class="flex flex-col items-center text-stone-300 transition-all" href="#">
<i data-lucide="cat" style="width: 1.515rem; height: 1.515rem;"></i>
<span class="text-[10px] font-black mt-1 tracking-wider">關於</span>
</a>
</nav>
<script>
        lucide.createIcons();
    </script>
</body></html>
