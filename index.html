<!DOCTYPE html>
<html class="light" lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "background": "#fef9ed",
            "primary": "#6f4627",
            "on-background": "#1d1c14",
            "primary-container": "#8b5e3c"
          },
          fontFamily: {
            "headline": ["Epilogue"],
            "body": ["Manrope"],
            "label": ["Manrope"]
          }
        }
      }
    }
  </script>
  
  <style>
    /* 改用 100dvh (動態視口高度)，確保在手機瀏覽器上不會被導覽列遮擋 */
    body {
      min-height: 100dvh;
      margin: 0;
    }
    .grain-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 99;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }
  </style>
</head>

<body class="bg-background text-on-background font-body selection:bg-primary-container selection:text-white overflow-hidden">
  <div class="grain-overlay"></div>
  
  <!-- 將原本的 h-[884px] 改為 h-[100dvh]，讓主區塊完美貼合各種手機螢幕 -->
  <main class="relative h-[100dvh] w-full flex flex-col items-center px-8 justify-center" style="background-color: #e5e1d5;">
    
    <!-- Logo 區塊：置中顯示 -->
    <div class="flex flex-col items-center justify-center space-y-8 mb-12 w-full">
      <img alt="Nora Trail Logo" class="w-full h-auto drop-shadow-sm max-w-[252px]" src="https://lh3.googleusercontent.com/aida/ADBb0uiZ3MxYLcDntgUN7xF7TES6nuwTis2rKAVghEsBeraXpGIDqrFJEqlDocXBOb7oCoSiCHnVF3pXnWDrwYIQrnvila0Ft4vDtlQQDc8Pz25Vhsi8uiDIbt5LGA16S6mg6z1E8XQb8ALc0eNg89mPUeQbgLbdgQ2IZZ-LgvtC6vDK68lj8nhr-nNhzun0HQuqR5xAbwvGK_nF6QWI6CldqUY_B6PppcxiHB1yp2_HPifVR8gvb9WnVYYS9GguUZ_Je8i2lFTtUCN0Kw">
    </div>

    <!-- 按鈕區塊：設定為距離底部 10%~15%，保證不管螢幕多小都不會被吃掉 -->
    <div class="absolute bottom-[10%] md:bottom-[15%] left-1/2 -translate-x-1/2 w-full max-w-[240px]">
      <button onclick="window.location.href='noratrail.html'" aria-label="開啟旅程" class="w-full h-16 cursor-pointer bg-primary text-white rounded-full font-medium transition-transform active:scale-95 shadow-lg flex items-center justify-center">
        我們出發吧！
      </button>
    </div>

  </main>
</body>
</html>
