<!DOCTYPE html> <html class="light" lang="zh-Hant"> <head>
  <meta charset="utf-8"> <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <title>Nora Trail - 歡迎</title> <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script id="tailwind-config">
    tailwind.config = { // 自定義 Tailwind 的配置
      darkMode: "class", // 使用 class 方式切換深色模式
      theme: {
        extend: {
          colors: { // 定義專案專用的品牌顏色
            "background": "#fef9ed",
            "primary": "#6f4627",
            "on-background": "#1d1c14",
            "primary-container": "#8b5e3c"
          },
          fontFamily: { // 設定標題與內文使用的字體族群
            "headline": ["Epilogue"],
            "body": ["Manrope"],
          }
        }
      }
    }
  </script>
  
  <style>
    body {
      min-height: 100dvh; /* 設定最小高度為 100% 動態視窗高度 */
      margin: 0; /* 移除預設邊距 */
      overflow-x: hidden; /* 防止左右出現滾動條 */
    }
    
    /* 建立噪點（顆粒感）遮罩層，增加視覺質感 */
    .grain-overlay {
      position: absolute; 
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; /* 讓點擊事件穿透此層，不影響操作 */
      z-index: 1; /* 位於背景之上 */
      opacity: 0.05; /* 透明度極低，隱約可見 */
      /* 使用 SVG 產生隨機噪點紋理 */
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    /* 定義「走路」動畫：上下位移並輕微旋轉 */
    @keyframes walk {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-3px) rotate(-4deg); }
      50% { transform: translateY(0) rotate(0deg); }
      75% { transform: translateY(-3px) rotate(4deg); }
    }
    .animate-walk {
      animation: walk 0.4s infinite linear; /* 無限循環走路動畫 */
    }
  </style>
</head>

<body class="bg-background text-on-background font-body selection:bg-primary-container selection:text-white overflow-hidden w-full max-w-[100vw]">
  
  <main class="relative h-[100dvh] w-full flex flex-col items-center px-8 justify-center overflow-hidden" style="background-color: #e5e1d5;">
    
    <div class="grain-overlay"></div>
    
    <div class="relative z-10 flex flex-col items-center justify-center space-y-8 mb-12 w-full">
      <img alt="Nora Trail Logo" class="w-full h-auto drop-shadow-sm max-w-[252px]" src="https://i.ibb.co/tpyRbX4P/logo-20260328-S.png">
    </div>

    <div class="absolute bottom-[25%] md:bottom-[30%] left-1/2 -translate-x-1/2 w-full max-w-[200px] z-10 flex flex-col items-center">
      
      <div class="relative w-full h-5 bg-primary/10 rounded-full">
        <div id="progress-fill" class="absolute top-0 left-0 h-full bg-primary rounded-full transition-all duration-75" style="width: 0%;"></div>

        <div id="walking-cat" class="absolute bottom-1.5 -translate-x-1/2 transition-all duration-75" style="left: 0%;">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="w-8 h-8 animate-walk" fill="#6f4627">
            <path d="M480 320c0-17.7-14.3-32-32-32s-32 14.3-32 32c0 20.3-6 38.6-16.1 53.6L363.3 280c25.4-23.3 41.7-56.7 41.7-94.2c0-70.7-57.3-128-128-128c-4.8 0-9.5 .3-14.2 .8C252.3 22.3 222 0 188 0C137.2 0 96 41.2 96 92c0 6 .6 11.9 1.7 17.6C59.3 125.7 32 165.7 32 212c0 14.1 2.3 27.6 6.5 40.2c1.7 5.3 4.8 9.9 9 13.5L208 432c0 17.7 14.3 32 32 32s32-14.3 32-32c0-6 2.2-11.4 5.8-15.6l64.1-137.9c13.4-1.9 25.4-8 34.6-16.7l64 32c0 17.7 14.3 32 32 32s32-14.3 32-32zm-32-64c-22.1 0-40 17.9-40 40V416c0 17.7 14.3 32 32 32s32-14.3 32-32V296c0-22.1-17.9-40-40-40zm-288 0c-22.1 0-40 17.9-40 40V416c0 17.7 14.3 32 32 32s32-14.3 32-32V296c0-22.1-17.9-40-40-40z"/>
          </svg>
        </div>
      </div>
    </div>

  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => { // 確保網頁 DOM 元素加載完成後執行
      const fill = document.getElementById("progress-fill"); // 獲取進度條元素
      const cat = document.getElementById("walking-cat"); // 獲取貓咪元素
      
      let progress = 0; // 初始化進度數值為 0
      const duration = 2500; // 設定總動畫時間（2.5 秒）
      const intervalTime = 20; // 設定每次跳動的時間間隔（20 毫秒）
      const step = (100 / (duration / intervalTime)); // 計算每次間隔應增加的進度比例

      // 設定定時器，模擬進度增長
      const timer = setInterval(() => {
        progress += step; // 增加進度
        
        if (progress >= 100) { // 如果進度達到 100%
          progress = 100;
          clearInterval(timer); // 停止定時器
          
          setTimeout(() => {
            // 自動跳轉到目標頁面
            window.location.href = 'noratrail.html'; 
          }, 300); // 跑滿後稍微停留 0.3 秒再跳轉
        }
        
        // 即時更新 CSS 樣式，讓進度條與貓咪動起來
        fill.style.width = `${progress}%`;
        cat.style.left = `${progress}%`;
        
      }, intervalTime);
    });
  </script>
</body>
</html>
